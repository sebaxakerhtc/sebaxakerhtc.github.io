<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканирай баркод</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { font-size: 22px; margin-bottom: 10px; color: #4fc3f7; }
        p { font-size: 14px; color: #aaa; margin-bottom: 20px; text-align: center; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #1a1a1a; }
        #reader video { width: 100% !important; }
        #reader__dashboard_section { background: #1a1a1a; }
        #reader__dashboard_section button {
            background: #4fc3f7; border: none; color: #000; padding: 10px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px;
        }
        #reader__scan_region img { display: none; }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>📷 Сканирай баркод</h1>
    <p>Насочете камерата към баркода на продукта</p>
    <div id="reader"></div>
    <div class="status" id="status">Камерата се зарежда...</div>

    <script>
        let html5QrCode = null;
        let isTgReady = false;

        function initTelegram(callback) {
            let attempts = 30;
            function check() {
                if (window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.ready();
                    Telegram.WebApp.expand();
                    isTgReady = true;
                    callback(true);
                } else if (attempts > 0) {
                    attempts--;
                    setTimeout(check, 100);
                } else {
                    callback(false);
                }
            }
            check();
        }

        function startScanner() {
            const status = document.getElementById('status');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0 },
                function onScan(decodedText) {
                    if (!decodedText) return;
                    if (html5QrCode) { try { html5QrCode.pause(); } catch(e) {} }
                    status.textContent = '✅ Баркод: ' + decodedText;
                    if (isTgReady && Telegram.WebApp) {
                        Telegram.WebApp.sendData(decodedText);
                        setTimeout(function() {
                            Telegram.WebApp.close();
                        }, 500);
                    } else {
                        navigator.clipboard.writeText(decodedText);
                        status.textContent = '✅ Кодът е копиран: ' + decodedText;
                    }
                },
                function() {}
            ).then(() => {
                status.textContent = '✅ Камерата работи. Насочете към баркод.';
            }).catch(err => {
                status.textContent = '❌ Грешка: ' + err;
            });
        }

        initTelegram(function(success) {
            if (!success) console.log('Telegram WebApp unavailable – clipboard fallback');
            window.addEventListener('DOMContentLoaded', startScanner);
            // Ако DOM вече е зареден, стартираме веднага
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                startScanner();
            }
        });
    </script>
</body>
</html>
