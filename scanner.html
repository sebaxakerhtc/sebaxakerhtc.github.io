<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканирай баркод</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { font-size: 22px; margin-bottom: 10px; color: #4fc3f7; }
        p { font-size: 14px; color: #aaa; margin-bottom: 20px; text-align: center; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.4); background: #1a1a1a; }
        #reader video { border-radius: 12px 12px 0 0; width: 100% !important; }
        #reader__dashboard_section { background: #1a1a1a; border-radius: 0 0 12px 12px; }
        #reader__dashboard_section button { background: #4fc3f7; border: none; color: #000; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px; }
        #reader__dashboard_section button:hover { background: #29b6f6; }
        #reader__scan_region img { display: none; }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
        .result { margin-top: 16px; background: #1a1a1a; padding: 16px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
        .result .code { font-size: 24px; font-weight: 700; color: #4fc3f7; word-break: break-all; }
        .result .label { font-size: 12px; color: #888; margin-top: 4px; }
        .hidden { display: none; }
        .btn-rescan { margin-top: 20px; background: transparent; border: 1px solid #555; color: #aaa; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%; max-width: 400px; }
        .btn-rescan:hover { border-color: #888; color: #fff; }
        .debug-box {
            margin-top: 16px;
            background: #111;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            font-size: 12px;
            color: #4fc3f7;
            border: 1px solid #333;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .status-ok { color: #4caf50; }
        .status-err { color: #f44336; }
    </style>
</head>
<body>
    <h1>📷 Сканирай баркод</h1>
    <p>Насочете камерата към баркода на продукта</p>

    <div id="debugInfo" class="debug-box">⏳ Зареждане...</div>

    <div id="reader"></div>
    <div class="status" id="status">Камерата се зарежда...</div>

    <div id="resultContainer" class="result hidden">
        <div class="label">✅ Открит баркод</div>
        <div class="code" id="barcodeResult"></div>
    </div>

    <button id="rescanBtn" class="btn-rescan hidden" onclick="restartScanner()">🔄 Сканирай отново</button>

    <script>
        let html5QrCode = null;
        let lastBarcode = '';
        let isTelegram = false;

        function debug(msg, isError) {
            const el = document.getElementById('debugInfo');
            const cls = isError ? 'status-err' : 'status-ok';
            el.innerHTML += `\n<span class="${cls}">${msg}</span>`;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        // --- Инициализация Telegram WebApp ---
        function initTelegram() {
            try {
                debug('🔍 Проверка на Telegram.WebApp...');
                if (window.Telegram && Telegram.WebApp) {
                    debug('✅ Telegram.WebApp съществува');
                    debug('✅ initData: ' + (Telegram.WebApp.initData || 'празно'));
                    debug('✅ initDataUnsafe: ' + JSON.stringify(Telegram.WebApp.initDataUnsafe || {}));
                    Telegram.WebApp.ready();
                    debug('✅ Telegram.WebApp.ready() - OK');
                    Telegram.WebApp.expand();
                    debug('✅ Telegram.WebApp.expand() - OK');
                    isTelegram = true;
                    debug('✅ WebApp работен!');
                } else {
                    debug('❌ Telegram.WebApp НЕ е намерен!', true);
                    debug('❌ window.Telegram = ' + typeof window.Telegram, true);
                    if (document.querySelector('script[src*="telegram-web-app"]')) {
                        debug('ℹ️ Telegram JS скрипта е зареден', true);
                    } else {
                        debug('❌ Telegram JS скрипт липсва в DOM', true);
                    }
                }
            } catch(e) {
                debug('❌ Грешка при инициализация: ' + e.message, true);
            }
        }

        function startScanner() {
            const status = document.getElementById('status');

            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0 },
                onScanSuccess,
                onScanFailure
            ).then(() => {
                status.textContent = '✅ Камерата работи. Насочете към баркод.';
                debug('✅ Камерата стартира');
            }).catch(err => {
                status.textContent = '❌ Грешка с камерата: ' + err;
                debug('❌ Грешка с камерата: ' + err, true);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (decodedText && decodedText !== lastBarcode) {
                lastBarcode = decodedText;
                html5QrCode.pause();
                debug('✅ Открит баркод: ' + decodedText);

                document.getElementById('reader').classList.add('hidden');
                document.getElementById('status').classList.add('hidden');
                document.getElementById('resultContainer').classList.remove('hidden');
                document.getElementById('barcodeResult').textContent = decodedText;
                document.getElementById('rescanBtn').classList.remove('hidden');

                sendBarcode(decodedText);
            }
        }

        function onScanFailure(error) { /* ignore */ }

        function sendBarcode(barcode) {
            debug('📤 Опит за изпращане на: ' + barcode);
            debug('🔍 isTelegram = ' + isTelegram);

            if (isTelegram) {
                try {
                    debug('📤 Извиквам Telegram.WebApp.sendData("' + barcode + '")');
                    Telegram.WebApp.sendData(barcode);
                    debug('✅ sendData() успешно');
                    debug('❌ Затварям WebApp...');
                    Telegram.WebApp.close();
                } catch(e) {
                    debug('❌ Грешка при sendData: ' + e.message, true);
                }
            } else {
                debug('❌ НЕ мога да изпратя - WebApp не е активен!', true);
                debug('ℹ️ Отворете този URL през Telegram бутон "📷 Сканирай баркод"', true);
                // Пробвам clipboard като fallback
                try {
                    navigator.clipboard.writeText(barcode).then(() => {
                        debug('ℹ️ Баркодът е копиран в клипборд: ' + barcode);
                    });
                } catch(e) {
                    debug('❌ Неуспешно копиране: ' + e.message, true);
                }
            }
        }

        function restartScanner() {
            lastBarcode = '';
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('rescanBtn').classList.add('hidden');
            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').textContent = 'Камерата се зарежда...';
            html5QrCode.resume();
            debug('🔄 Скенер рестартиран');
        }

        // Старт
        window.addEventListener('DOMContentLoaded', () => {
            debug('🚀 Страницата заредена');
            initTelegram();
            startScanner();
        });
    </script>
</body>
</html>
