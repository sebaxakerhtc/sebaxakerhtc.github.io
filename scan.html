<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканирай баркод</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        h1 { font-size: 18px; margin: 8px 0; color: #4fc3f7; }
        .info {
            width: 100%; max-width: 400px;
            background: #1a1a1a; border-radius: 8px;
            padding: 10px; margin-bottom: 10px;
            font-size: 13px; line-height: 1.6;
        }
        .info .lbl { color: #888; }
        .info .val { color: #4fc3f7; word-break: break-all; }
        .info .ok { color: #66bb6a; }
        .info .err { color: #ef5350; }
        #reader { width: 100%; max-width: 400px; }
        #reader video { width: 100% !important; }
        .btn {
            width: 100%; max-width: 400px; margin-top: 8px;
            background: #4fc3f7; color: #000; border: none;
            padding: 12px 24px; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .btn-green { background: #66bb6a; color: #fff; }
        .btn-red { background: #ef5350; color: #fff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>📷 Сканирай баркод</h1>

    <div class="info">
        <div><span class="lbl">window.Telegram: </span><span class="val" id="dTG">⚠</span></div>
        <div><span class="lbl">Telegram.WebApp: </span><span class="val" id="dWA">⚠</span></div>
        <div><span class="lbl">sendData(): </span><span class="val" id="dSD">⚠</span></div>
    </div>

    <div id="reader"></div>
    <div class="info" id="statusInfo"><span class="lbl">📷 </span><span class="val" id="statusText">Стартиране...</span></div>

    <div id="resultArea" class="hidden" style="width:100%;max-width:400px;">
        <div class="info">
            <div><span class="lbl">📦 Баркод: </span><span class="val" id="bcVal">-</span></div>
            <div><span class="lbl">sendData: </span><span class="val" id="sdResult">-</span></div>
        </div>
        <button id="btnSD" class="btn btn-green" onclick="doSendData()">📤 Изпрати (sendData)</button>
        <button id="btnDL" class="btn" onclick="doDeepLink()">🔗 Deep Link</button>
        <button id="btnClose" class="btn btn-red" onclick="doClose()">❌ Затвори</button>
    </div>

    <script>
        let lastCode = '';
        let tgOk = false;

        function $(id) { return document.getElementById(id); }

        function init() {
            const tg = window.Telegram;
            const wa = tg && tg.WebApp;
            tgOk = !!(wa);
            $('dTG').textContent = tg ? '✅ да' : '❌ НЕ';
            $('dTG').className = tg ? 'val ok' : 'val err';
            $('dWA').textContent = wa ? '✅ да' : '❌ НЕ';
            $('dWA').className = wa ? 'val ok' : 'val err';
            $('dSD').textContent = (wa && typeof wa.sendData === 'function') ? '✅ да' : '❌ НЕ';
            $('dSD').className = (wa && typeof wa.sendData === 'function') ? 'val ok' : 'val err';
            if (wa) { try { wa.ready(); wa.expand(); } catch(e) {} }
        }

        function startScanner() {
            init();
            setStatus('📷 Стартиране на камерата...');
            new Html5Qrcode("reader").start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 120 } },
                function(code) {
                    if (!code || code === lastCode) return;
                    lastCode = code;
                    $('bcVal').textContent = code;
                    $('resultArea').classList.remove('hidden');
                    setStatus('✅ Баркод: ' + code);
                },
                function() {}
            ).then(() => {
                setStatus('✅ Камерата работи. Насочете към баркод.');
            }).catch(e => {
                setStatus('❌ Грешка: ' + e);
            });
        }

        function setStatus(msg) { $('statusText').textContent = msg; }

        function doSendData() {
            if (!lastCode) return;
            if (!tgOk || !window.Telegram || !window.Telegram.WebApp) {
                $('sdResult').textContent = '❌ Telegram.WebApp не е наличен';
                $('sdResult').className = 'val err';
                return;
            }
            try {
                window.Telegram.WebApp.sendData(lastCode);
                $('sdResult').textContent = '✅ sendData() извикан успешно за ' + lastCode;
                $('sdResult').className = 'val ok';
            } catch(e) {
                $('sdResult').textContent = '❌ sendData() грешка: ' + e.message;
                $('sdResult').className = 'val err';
            }
        }

        function doDeepLink() {
            if (!lastCode) return;
            var url = 'https://t.me/BOLERO_EVO2_BOT?start=BARCODE_' + lastCode;
            if (tgOk && window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
                try {
                    window.Telegram.WebApp.openTelegramLink(url);
                    $('sdResult').textContent = '🔗 openTelegramLink() извикан';
                    $('sdResult').className = 'val';
                } catch(e) {
                    $('sdResult').textContent = '❌ openTelegramLink грешка: ' + e.message;
                    $('sdResult').className = 'val err';
                }
            } else {
                window.open(url, '_blank');
                $('sdResult').textContent = '🔗 Отворен в браузър: ' + url;
                $('sdResult').className = 'val';
            }
        }

        function doClose() {
            if (tgOk && window.Telegram && window.Telegram.WebApp) {
                try { window.Telegram.WebApp.close(); } catch(e) {}
            } else {
                document.body.innerHTML = '<p style="text-align:center;margin-top:40vh;color:#888;">❌ Затворено</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
