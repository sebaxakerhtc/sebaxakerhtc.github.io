<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сканирай баркод</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { font-size: 22px; margin-bottom: 10px; color: #4fc3f7; }
        p { font-size: 14px; color: #aaa; margin-bottom: 20px; text-align: center; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #1a1a1a; }
        #reader video { width: 100% !important; }
        #reader__dashboard_section { background: #1a1a1a; }
        #reader__dashboard_section button {
            background: #4fc3f7; border: none; color: #000; padding: 10px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px;
        }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>📷 Сканирай баркод</h1>
    <p>Насочете камерата към баркода на продукта</p>
    <div id="reader"></div>
    <div class="status" id="status">Зареждане...</div>
    <div class="status hidden" id="done">✅ Изпращане...</div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        function startScanner() {
            new Html5Qrcode("reader").start(
                { facingMode: "environment" },
                { fps: 15, qrbox: { width: 280, height: 120 } },
                function(code) {
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('status').classList.add('hidden');
                    document.getElementById('done').classList.remove('hidden');
                    // Deep link: отваря чата с бота и изпраща /start BARCODE_...
                    window.location.href = 'https://t.me/bolero_alexbot?start=BARCODE_' + encodeURIComponent(code);
                },
                function() {}
            ).then(() => {
                document.getElementById('status').textContent = '✅ Камерата работи. Насочете към баркод.';
            }).catch(err => {
                document.getElementById('status').textContent = '❌ Грешка: ' + err;
            });
        }
        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
